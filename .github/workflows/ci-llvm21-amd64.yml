name: CI (amd64, llvm21)

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      LLVM_VERSION: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- vcpkg binary caching via GitHub Actions cache ---
      - name: Export GitHub Actions cache environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # --- LLVM 21 ---
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y \
            llvm-${{ env.LLVM_VERSION }} \
            llvm-${{ env.LLVM_VERSION }}-dev \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            libclang-${{ env.LLVM_VERSION }}-dev

          # Make versioned binaries available as unversioned commands
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${{ env.LLVM_VERSION }} 100

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            cmake \
            ninja-build \
            ccache \
            pkg-config \
            curl zip unzip tar

      # --- ccache ---
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-amd64-llvm21-${{ github.sha }}
          restore-keys: ccache-amd64-llvm21-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      # --- vcpkg ---
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}/vcpkg --depth 1
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      # --- Build ---
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_CONFIG_CMD=/usr/bin/llvm-config-${{ env.LLVM_VERSION }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: ccache statistics
        run: ccache -s

      # --- Tests ---
      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      - name: Run Scheme integration tests
        run: bash tests/run_tests.sh

      - name: Run core compiler tests
        run: bash core/tests/run_tests.sh
