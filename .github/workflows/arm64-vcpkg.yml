name: CMake vcpkg ARM64 CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VCPKG_BINARY_SOURCES: 'clear;gh,readwrite'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Keep this in case other submodules are added later

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git vcpkg --depth 1

      - name: Export Github Actions Cache Environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          if [ -f "vcpkg/bootstrap-vcpkg.sh" ]; then
            vcpkg/bootstrap-vcpkg.sh
          else
            echo "ERROR: vcpkg/bootstrap-vcpkg.sh not found after clone."
            exit 1
          fi

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_PREFER_STATIC_LIBS=on \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)
    
