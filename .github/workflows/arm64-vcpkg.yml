name: CMake vcpkg ARM64 CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      # Force CMake to prioritize vcpkg over system libraries
      CMAKE_PREFIX_PATH: "${{ github.workspace }}/vcpkg_installed/arm64-linux"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl zip unzip tar

      - name: Export GitHub Actions Cache Environment
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      # Move LLVM installation BEFORE CMake configuration to ensure any 
      # find_package(zstd) calls in LLVM/Clang don't conflict later.
      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 lld-22 llvm-22-dev

      - name: Configure CMake
        run: |
          # Use -DCMAKE_IGNORE_PATH to prevent picking up system zstd
          # Use Manifest Mode (vcpkg.json) if possible for better isolation
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_IGNORE_PATH="/usr/lib/cmake/zstd;/usr/share/cmake/zstd"

      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure
