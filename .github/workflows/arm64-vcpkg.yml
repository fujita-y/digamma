name: CMake vcpkg ARM64 CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm # Native GitHub ARM64 runner
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite' # Enables GitHub Actions caching for vcpkg

    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)
        with:
          submodules: true # Required if vcpkg is a submodule

      - name: Export GitHub Actions Cache Environment
        uses: [actions/github-script@v7](https://github.com)
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg (if not a submodule)
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure
