name: CMake vcpkg ARM64 CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    env:
      # Removed 'x-gha' as it is deprecated/removed in newer vcpkg versions
      VCPKG_BINARY_SOURCES: 'clear' 
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl zip unzip tar
          
      - name: Install vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh
          fi
          
      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 lld-22 llvm-22-dev
          
      - name: Make LLVM 22 Default
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100
          
      - name: Configure CMake
        run: |
          # Use CMAKE_DISABLE_FIND_PACKAGE_ZSTD=OFF to let vcpkg handle it
          # and specifically set the ZSTD_LIBRARY/INCLUDE to vcpkg paths 
          # to prevent picking up system fragments that cause target redefinition.
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-22/lib/cmake/llvm \
            -DCMAKE_POLICY_DEFAULT_CMP0074=NEW \
            -DZstd_ROOT="${{ github.workspace }}/build/vcpkg_installed/arm64-linux"
            
      - name: Build
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure
